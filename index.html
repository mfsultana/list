<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Rundown Poster</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="poster-container">
        <div class="poster-card">
            
            <header class="header">
                <div class="title">
                    <h1>Rundown<br>Deep Talk</h1>
                </div>
            </header>

            <div class="event-details">
                <span>23 Mei 2026</span>
                <span>Mulai jam 22:20</span>
            </div>

            <ul class="schedule-list">
                <li class="schedule-item purple">
                    <div class="time-badge">22:20 – 23:00</div>
                    <div class="event-desc">Opening play Mobile Legends Game</div>
                </li>
                <li class="schedule-item green">
                    <div class="time-badge">23:00 – 23:30</div>
                    <div class="event-desc">smart game</div>
                </li>
                <li class="schedule-item purple">
                    <div class="time-badge">23:30 – 00:00</div>
                    <div class="event-desc">Deep Talk</div>
                </li>
                <li class="schedule-item green">
                    <div class="time-badge">00:00 – Finish</div>
                    <div class="event-desc">Watching Adult Scenes</div>
                </li>
            </ul>

            <footer class="footer">
                <span>www.reallygreatsite.com</span>
                <span>hello@reallygreatsite.com</span>
            </footer>

        </div>
    </div>

</body>
</html>
